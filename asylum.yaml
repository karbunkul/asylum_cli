# Sample Asylum Configuration
environment:
  ASYLUM_APP_NAME: "Asylum CLI"
  ASYLUM_DEBUG: "true"
  PUB_CACHE: $ASYLUM_ROOT/.pub-cache
  PATH: $PATH:$ASYLUM_ROOT/.pub-cache/bin:$ASYLUM_ROOT/.fvm/flutter_sdk/bin

aliases:
  ll: "ls -la"
  gs: "git status"
  d: "dart"
  clean: "flutter clean"
  say-hi: "echo 'Hello from Asylum!'"
